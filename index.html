<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe game</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button class="new-btn">New Game</button>
    </div>
    
    <h1>Tic Tac Toe</h1>
    <div class="inputField hide">
        <input type="text" placeholder="Player1" id="name1" required>
        <input type="text" placeholder="Player2" id="name2" required>
,<br><button id="startGame">Start Game</button>
    </div>

    <div class="container">
        <div class="game">
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
                        
        </div>
    
    </div>
    <button id="reset-button">Reset Game</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
